name: Build Quiver Static Site

on:
  push:
    branches: [ "master", "main" ] # 当推送到主干分支时自动触发
  workflow_dispatch: # 允许手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest # 使用 GitHub 官方的 Ubuntu 环境

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' 

    # GitHub 的 Ubuntu 环境默认自带 make 等工具，直接执行构建
    - name: Build Quiver (make all)
      run: make all

    - name: Upload src directory as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: quiver-static-site # 下载时的压缩包名称
        path: src/ # 只将构建好后的纯静态 src 目录打包
        retention-days: 7
