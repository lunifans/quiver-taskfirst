name: Build Quiver Static Site

on:
  push:
    branches: [ "master", "main" ] # 当推送到主干分支时自动触发
  workflow_dispatch: # 允许手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest # 使用 GitHub 官方的 Ubuntu 环境

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' 

    # 【新增步骤】：让 Ubuntu 服务器临时安装 ImageMagick 图像处理工具
    - name: Install ImageMagick
      run: sudo apt-get update && sudo apt-get install -y imagemagick

    # 现在的云端环境已经具备所有条件了，开始执行构建
    - name: Build Quiver (make all)
      run: make all

    - name: Upload src directory as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: quiver-static-site # 下载时的压缩包名称
        path: src/ # 只将构建好后的纯静态 src 目录打包
        retention-days: 7
